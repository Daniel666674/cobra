<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alivia · Sistema Operativo para Firmas Contables</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =============================================
   ALIVIA — Design System v1.0
   ============================================= */
:root {
  --brand:          #4F46E5;
  --brand-hover:    #4338CA;
  --brand-light:    rgba(79,70,229,0.10);
  --brand-border:   rgba(79,70,229,0.22);
  --brand-glow:     rgba(79,70,229,0.35);
  --accent:         #0D9488;
  --accent-light:   rgba(13,148,136,0.10);

  /* Sidebar */
  --sb-w:           240px;
  --sb-bg:          #0B0E1C;
  --sb-border:      rgba(255,255,255,0.05);
  --sb-item:        #7A8A9E;
  --sb-hover:       #C4CFDC;
  --sb-active-bg:   rgba(79,70,229,0.14);
  --sb-active:      #A5B4FC;

  /* Workspace */
  --ws-bg:          #F1F4F9;
  --ws-surface:     #FFFFFF;
  --ws-hover:       #F8FAFB;
  --ws-border:      #E4E8EF;
  --ws-border-lt:   #EEF1F6;

  /* Text */
  --t1:  #0D1527;
  --t2:  #3C4A5C;
  --t3:  #6F7E93;
  --t4:  #A8B4C2;

  /* Semantic */
  --green:      #12B76A;  --green-bg:  rgba(18,183,106,0.10);
  --amber:      #F79009;  --amber-bg:  rgba(247,144,9,0.10);
  --red:        #F04438;  --red-bg:    rgba(240,68,56,0.10);
  --blue:       #2E90FA;  --blue-bg:   rgba(46,144,250,0.10);
  --purple:     #7C3AED;  --purple-bg: rgba(124,58,237,0.10);
  --gray:       #667085;  --gray-bg:   rgba(102,112,133,0.10);

  /* Shadows */
  --sh-xs: 0 1px 2px rgba(16,24,40,0.05);
  --sh-sm: 0 1px 3px rgba(16,24,40,0.10), 0 1px 2px rgba(16,24,40,0.06);
  --sh-md: 0 4px 8px -2px rgba(16,24,40,0.10), 0 2px 4px -2px rgba(16,24,40,0.06);
  --sh-lg: 0 12px 16px -4px rgba(16,24,40,0.08), 0 4px 6px -2px rgba(16,24,40,0.03);
  --sh-xl: 0 20px 24px -4px rgba(16,24,40,0.08), 0 8px 8px -4px rgba(16,24,40,0.03);

  /* Radii */
  --r-xs:   4px;
  --r-sm:   6px;
  --r-md:   10px;
  --r-lg:   14px;
  --r-xl:   20px;
  --r-full: 9999px;

  /* Motion */
  --fast: 120ms ease;
  --base: 200ms ease;
  --slow: 320ms ease;

  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* ── Reset ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ws-bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit}
ul,ol{list-style:none}
img{display:block;max-width:100%}
table{border-collapse:collapse;width:100%}

/* ── App Shell ───────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* =============================================
   SIDEBAR
   ============================================= */
.sidebar{
  width:var(--sb-w);min-width:var(--sb-w);
  background:var(--sb-bg);
  display:flex;flex-direction:column;
  border-right:1px solid var(--sb-border);
  overflow:hidden;
  position:relative;z-index:10;
  transition:width var(--base);
}
/* right glow line */
.sidebar::after{
  content:'';position:absolute;top:0;right:0;
  width:1px;height:100%;
  background:linear-gradient(180deg,transparent 0%,var(--brand-glow) 40%,var(--brand-glow) 60%,transparent 100%);
  pointer-events:none;
}

/* Header */
.sb-header{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--sb-border);
  flex-shrink:0;
}
.sb-logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:34px;height:34px;flex-shrink:0;
  background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 100%);
  border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(79,70,229,0.45);
}
.logo-mark svg{width:18px;height:18px}
.logo-wordmark{display:flex;flex-direction:column;gap:1px}
.logo-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.4px;line-height:1}
.logo-tag{font-size:9.5px;font-weight:500;color:rgba(255,255,255,0.28);letter-spacing:0.8px;text-transform:uppercase}

/* Nav */
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.nav-group{font-size:10px;font-weight:600;letter-spacing:0.9px;text-transform:uppercase;color:rgba(255,255,255,0.18);padding:14px 8px 4px}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;
  border-radius:var(--r-sm);
  color:var(--sb-item);
  font-size:13px;font-weight:500;
  cursor:pointer;
  transition:var(--fast);
  margin-bottom:1px;
  position:relative;
  user-select:none;
}
.nav-item:hover{background:rgba(255,255,255,0.055);color:var(--sb-hover)}
.nav-item.active{background:var(--sb-active-bg);color:var(--sb-active)}
.nav-item.active::before{
  content:'';
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:18px;
  background:var(--brand);
  border-radius:0 3px 3px 0;
}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.65;transition:opacity var(--fast)}
.nav-item:hover svg,.nav-item.active svg{opacity:1}
.nav-item span.label{flex:1}
.nav-badge{
  margin-left:auto;
  background:var(--red);color:#fff;
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:var(--r-full);
  min-width:18px;text-align:center;
  line-height:16px;height:16px;
}
.nav-badge.blue{background:var(--brand)}
.nav-badge.green{background:var(--green)}
.nav-badge.amber{background:var(--amber)}
.nav-badge.gray{background:var(--gray)}

/* Footer */
.sb-footer{
  padding:10px 12px;
  border-top:1px solid var(--sb-border);
  flex-shrink:0;
}
.user-card{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:var(--r-sm);
  cursor:pointer;transition:var(--fast);
}
.user-card:hover{background:rgba(255,255,255,0.055)}
.user-av{
  width:32px;height:32px;border-radius:var(--r-full);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11.5px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#4F46E5,#7C3AED);
}
.user-name{font-size:12.5px;font-weight:600;color:#C4CFDC}
.user-role{font-size:11px;color:rgba(255,255,255,0.28)}

/* =============================================
   MAIN WORKSPACE
   ============================================= */
.main{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;min-width:0}

/* views */
.view{padding:26px 28px;animation:vIn 0.18s ease both}
@keyframes vIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* View Header */
.view-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}
.view-hd h1{font-size:21px;font-weight:700;color:var(--t1);letter-spacing:-0.3px;line-height:1.2}
.view-hd .sub{font-size:13px;color:var(--t3);margin-top:3px}
.view-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* =============================================
   COMPONENTS
   ============================================= */

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;transition:var(--fast);white-space:nowrap;cursor:pointer}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 1px 2px rgba(79,70,229,0.25)}
.btn-primary:hover{background:var(--brand-hover);box-shadow:0 3px 8px rgba(79,70,229,0.35)}
.btn-secondary{background:var(--ws-surface);color:var(--t2);border:1px solid var(--ws-border);box-shadow:var(--sh-xs)}
.btn-secondary:hover{background:var(--ws-hover);border-color:#C9D2DC}
.btn-ghost{background:transparent;color:var(--t3);padding:7px 10px}
.btn-ghost:hover{background:rgba(0,0,0,0.04);color:var(--t2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{
  padding:7px;border-radius:var(--r-sm);
  background:var(--ws-surface);border:1px solid var(--ws-border);
  color:var(--t3);cursor:pointer;transition:var(--fast);
  display:inline-flex;align-items:center;justify-content:center;
}
.btn-icon:hover{background:var(--ws-hover);color:var(--t2)}
.btn-icon svg{width:16px;height:16px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,68,56,0.2)}
.btn-danger:hover{background:var(--red);color:#fff}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-full);font-size:11.5px;font-weight:500;white-space:nowrap}
.b-dot{width:6px;height:6px;border-radius:var(--r-full);flex-shrink:0}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-gray{background:var(--gray-bg);color:var(--gray)}
.b-brand{background:var(--brand-light);color:var(--brand)}
.b-accent{background:var(--accent-light);color:var(--accent)}

/* Cards */
.card{background:var(--ws-surface);border:1px solid var(--ws-border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm)}
.card-hover{transition:var(--base)}
.card-hover:hover{box-shadow:var(--sh-md);border-color:#C9D2DC;transform:translateY(-1px)}

/* Stat Cards */
.stat-card{
  background:var(--ws-surface);border:1px solid var(--ws-border);
  border-radius:var(--r-lg);padding:20px 22px;
  box-shadow:var(--sh-sm);transition:var(--base);
  position:relative;overflow:hidden;
}
.stat-card:hover{box-shadow:var(--sh-md);border-color:#C9D2DC}
.stat-icon{
  width:40px;height:40px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.stat-icon svg{width:20px;height:20px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-0.5px;color:var(--t1);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:12.5px;color:var(--t3);font-weight:500}
.stat-chg{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;margin-top:8px}
.stat-chg.up{color:var(--green)}.stat-chg.down{color:var(--red)}.stat-chg.neutral{color:var(--t3)}

/* Search */
.search{
  display:flex;align-items:center;gap:8px;
  background:var(--ws-surface);border:1px solid var(--ws-border);
  border-radius:var(--r-sm);padding:7px 12px;
  box-shadow:var(--sh-xs);transition:var(--fast);
}
.search:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-light)}
.search svg{width:15px;height:15px;color:var(--t3);flex-shrink:0}
.search input{border:none;outline:none;background:none;font-size:13px;color:var(--t1);width:100%}
.search input::placeholder{color:var(--t4)}

/* Filter Tabs */
.f-tabs{display:flex;align-items:center;gap:2px;background:var(--ws-bg);border:1px solid var(--ws-border);border-radius:var(--r-sm);padding:3px}
.f-tab{padding:5px 14px;border-radius:5px;font-size:12.5px;font-weight:500;color:var(--t3);cursor:pointer;transition:var(--fast);white-space:nowrap;user-select:none}
.f-tab.active{background:var(--ws-surface);color:var(--t1);box-shadow:var(--sh-xs)}
.f-tab:hover:not(.active){color:var(--t2)}

/* Table */
.tbl-wrap{background:var(--ws-surface);border:1px solid var(--ws-border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden}
.tbl-wrap table{width:100%}
.tbl-wrap th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;background:#FAFBFC;border-bottom:1px solid var(--ws-border);white-space:nowrap}
.tbl-wrap td{padding:11px 16px;font-size:13px;color:var(--t2);border-bottom:1px solid var(--ws-border-lt);vertical-align:middle}
.tbl-wrap tr:last-child td{border-bottom:none}
.tbl-wrap tbody tr{cursor:pointer;transition:background var(--fast)}
.tbl-wrap tbody tr:hover td{background:var(--ws-hover)}

/* Avatar */
.av{
  width:30px;height:30px;border-radius:var(--r-full);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.av-md{width:38px;height:38px;font-size:13px}
.av-lg{width:56px;height:56px;font-size:18px;font-weight:800}

/* Progress */
.prog{width:100%;height:6px;background:var(--ws-border);border-radius:var(--r-full);overflow:hidden}
.prog-fill{height:100%;border-radius:var(--r-full);transition:width var(--slow)}
.prog.sm{height:4px}

/* Toggle */
.tog{position:relative;width:36px;height:20px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--ws-border);border-radius:var(--r-full);cursor:pointer;transition:var(--fast)}
.tog input:checked+.tog-track{background:var(--brand)}
.tog-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:var(--r-full);transition:transform var(--fast);pointer-events:none;box-shadow:var(--sh-xs)}
.tog input:checked~.tog-thumb{transform:translateX(16px)}

/* Section headers */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:600;color:var(--t1)}
.sec-sub{font-size:12px;color:var(--t3);margin-top:2px}

/* Empty state */
.empty{text-align:center;padding:52px 24px;color:var(--t3)}
.empty svg{width:44px;height:44px;margin:0 auto 14px;opacity:0.25}
.empty h3{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty p{font-size:13px}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.info-item .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--t3);margin-bottom:4px}
.info-item .val{font-size:13.5px;color:var(--t1);font-weight:500}

/* Divider */
.divider{height:1px;background:var(--ws-border-lt);margin:16px 0}

/* =============================================
   MODAL
   ============================================= */
.modal-ov{
  position:fixed;inset:0;
  background:rgba(13,21,39,0.5);
  backdrop-filter:blur(4px);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;pointer-events:none;
  transition:opacity var(--base);
}
.modal-ov.open{opacity:1;pointer-events:auto}
.modal{
  background:var(--ws-surface);
  border:1px solid var(--ws-border);
  border-radius:var(--r-xl);
  box-shadow:var(--sh-xl);
  width:100%;max-width:700px;
  max-height:92vh;overflow-y:auto;
  transform:scale(0.96) translateY(12px);
  transition:transform var(--base);
}
.modal-ov.open .modal{transform:scale(1) translateY(0)}
.modal-hd{padding:22px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-0.3px}
.modal-sub{font-size:13px;color:var(--t3);margin-top:3px}
.modal-close{
  width:32px;height:32px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  color:var(--t3);cursor:pointer;transition:var(--fast);flex-shrink:0;
}
.modal-close:hover{background:var(--ws-bg);color:var(--t1)}
.modal-close svg{width:18px;height:18px}
.modal-body{padding:0 24px}
.modal-footer{padding:16px 24px 22px;display:flex;align-items:center;justify-content:flex-end;gap:10px;border-top:1px solid var(--ws-border-lt);margin-top:18px}
.modal-tabs{display:flex;border-bottom:1px solid var(--ws-border);margin-bottom:18px;gap:2px}
.m-tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:var(--fast)}
.m-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.m-tab:hover:not(.active){color:var(--t2)}

/* =============================================
   TOAST
   ============================================= */
.toasts{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:#0D1527;color:#fff;
  padding:12px 16px;border-radius:var(--r-md);
  font-size:13px;font-weight:500;
  box-shadow:var(--sh-lg);
  display:flex;align-items:center;gap:10px;
  pointer-events:auto;
  animation:toastIn 0.22s ease forwards;
  max-width:320px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{background:#062518;border:1px solid rgba(18,183,106,0.3);color:#6EE7B7}
.toast.warn{background:#2B1600;border:1px solid rgba(247,144,9,0.3);color:#FCD34D}
.toast.err{background:#2B0000;border:1px solid rgba(240,68,56,0.3);color:#FCA5A5}
.toast-ico{font-size:16px;flex-shrink:0}

/* =============================================
   SCROLLBAR
   ============================================= */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ws-border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#C0CAD5}

/* =============================================
   SOURCE BADGES (documents)
   ============================================= */
.src{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-full);font-size:11px;font-weight:600}
.src-gmail{background:rgba(234,67,53,0.1);color:#EA4335}
.src-outlook{background:rgba(0,114,239,0.1);color:#0072EF}
.src-whatsapp{background:rgba(37,211,102,0.1);color:#25D366}
.src-drive{background:rgba(249,171,0,0.1);color:#F9AB00}
.src-onedrive{background:rgba(0,120,212,0.1);color:#0078D4}
.src-manual{background:var(--gray-bg);color:var(--gray)}

/* =============================================
   DASHBOARD LAYOUTS
   ============================================= */
.dash-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.dash-row2{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:16px}
.dash-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}

.act-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--ws-border-lt)}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:var(--r-full);margin-top:5px;flex-shrink:0}
.act-txt{font-size:13px;color:var(--t2);line-height:1.4}
.act-time{font-size:11.5px;color:var(--t3);margin-top:2px}

.task-today{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--ws-border-lt);cursor:pointer;transition:var(--fast)}
.task-today:last-child{border-bottom:none}
.task-today:hover{opacity:0.8}
.tprio{width:4px;border-radius:var(--r-full);flex-shrink:0;align-self:stretch;min-height:32px}
.tprio.alta{background:var(--red)}.tprio.media{background:var(--amber)}.tprio.baja{background:var(--green)}

.wl-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--ws-border-lt)}
.wl-row:last-child{border-bottom:none}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:13px;font-weight:600;color:var(--t1)}
.wl-role{font-size:11px;color:var(--t3)}
.wl-bar{flex:2}
.wl-pct{font-size:12px;color:var(--t3);white-space:nowrap;text-align:right}

.int-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--ws-border-lt)}
.int-row:last-child{border-bottom:none}
.int-logo{width:28px;height:28px;border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.int-name{font-size:13px;font-weight:500;color:var(--t2);flex:1}
.int-sync{font-size:11px;color:var(--t3)}
.int-dot{width:8px;height:8px;border-radius:var(--r-full);flex-shrink:0}
.int-dot.on{background:var(--green);box-shadow:0 0 6px rgba(18,183,106,0.5)}
.int-dot.off{background:var(--t4)}

.miss-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--ws-border-lt)}
.miss-row:last-child{border-bottom:none}

/* =============================================
   CLIENTES
   ============================================= */
.cli-ctrl{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.cli-name-cell{display:flex;align-items:center;gap:10px}
.doc-pct{display:flex;align-items:center;gap:6px}
.doc-pct-bar{width:48px;height:4px;background:var(--ws-border);border-radius:var(--r-full);overflow:hidden;flex-shrink:0}

/* =============================================
   DOCUMENTOS
   ============================================= */
.doc-ctrl{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.doc-type-ic{
  width:32px;height:32px;border-radius:var(--r-xs);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;letter-spacing:-0.5px;
}
.miss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-top:14px}
.miss-card{background:var(--ws-surface);border:1px solid var(--ws-border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-sm);transition:var(--base)}
.miss-card:hover{box-shadow:var(--sh-md)}
.miss-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.miss-card-name{font-size:14px;font-weight:600;color:var(--t1)}
.miss-card-meta{font-size:11.5px;color:var(--t3);margin-top:2px}
.doc-cl{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-bottom:12px}
.dc-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:2px 0}
.dc-ic{width:16px;height:16px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.dc-item.ok .dc-ic{background:var(--green-bg);color:var(--green)}
.dc-item.miss .dc-ic{background:var(--red-bg);color:var(--red)}
.dc-item.ok{color:var(--t2)}.dc-item.miss{color:var(--t3)}
.miss-card-ft{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--ws-border-lt)}

/* =============================================
   TAREAS
   ============================================= */
.task-ctrl{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}

/* =============================================
   AUTOMATIZACIONES
   ============================================= */
.auto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.auto-card{
  background:var(--ws-surface);border:1px solid var(--ws-border);
  border-radius:var(--r-lg);padding:20px;
  box-shadow:var(--sh-sm);transition:var(--base);
  position:relative;overflow:hidden;cursor:pointer;
}
.auto-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--brand);border-radius:4px 0 0 4px;transition:var(--fast)}
.auto-card.off::before{background:var(--ws-border)}
.auto-card:hover{box-shadow:var(--sh-md);border-color:#C9D2DC}
.auto-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.auto-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.auto-desc{font-size:12px;color:var(--t3);line-height:1.4}
.rule{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.rule-lbl{font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;padding:3px 8px;border-radius:var(--r-full);flex-shrink:0;width:34px;text-align:center;line-height:16px}
.rule-lbl.if{background:rgba(46,144,250,0.12);color:var(--blue)}
.rule-lbl.then{background:rgba(18,183,106,0.12);color:var(--green)}
.rule-lbl.y{background:rgba(124,58,237,0.12);color:var(--purple)}
.rule-txt{font-size:12.5px;color:var(--t2);line-height:1.4;flex:1}
.auto-stats{display:flex;gap:16px;padding-top:12px;border-top:1px solid var(--ws-border-lt);margin-top:12px}
.auto-stat{flex:1;text-align:center}
.auto-stat-v{font-size:16px;font-weight:700;color:var(--t1)}
.auto-stat-l{font-size:11px;color:var(--t3);margin-top:1px}

/* =============================================
   INTEGRACIONES
   ============================================= */
.int-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.int-card{background:var(--ws-surface);border:1px solid var(--ws-border);border-radius:var(--r-lg);padding:22px;box-shadow:var(--sh-sm);transition:var(--base)}
.int-card:hover{box-shadow:var(--sh-md)}
.int-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.int-card-logo{width:44px;height:44px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.int-card-name{font-size:15px;font-weight:600;color:var(--t1)}
.int-card-type{font-size:12px;color:var(--t3);margin-top:2px}
.int-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.int-met-v{font-size:19px;font-weight:700;color:var(--t1)}
.int-met-l{font-size:11px;color:var(--t3);margin-top:2px}
.int-card-ft{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--ws-border-lt)}
.int-sync-info{font-size:11.5px;color:var(--t3)}
.int-sync-time{font-weight:500;color:var(--t2)}

/* =============================================
   EQUIPO
   ============================================= */
.equipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:22px}
.emp-card{background:var(--ws-surface);border:1px solid var(--ws-border);border-radius:var(--r-lg);padding:24px;box-shadow:var(--sh-sm);text-align:center}
.emp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
.emp-stat-v{font-size:20px;font-weight:700;color:var(--t1)}
.emp-stat-l{font-size:11px;color:var(--t3);margin-top:2px}
.wl-lbl-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;color:var(--t3);font-weight:500}

/* =============================================
   REPORTES
   ============================================= */
.rep-grid{display:grid;grid-template-columns:3fr 2fr;gap:18px;margin-bottom:18px}
.rep-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:18px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:150px;padding:0 2px}
.cb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.cb-fill{width:100%;max-width:36px;border-radius:4px 4px 0 0;min-height:4px;opacity:0.85;transition:opacity var(--fast);cursor:pointer}
.cb-fill:hover{opacity:1}
.cb-val{font-size:10.5px;color:var(--t2);font-weight:600}
.cb-lbl{font-size:11px;color:var(--t3);text-align:center}
.chart-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)}
.cl-dot{width:10px;height:10px;border-radius:var(--r-full)}
.rep-metric{text-align:center;padding:20px 16px}
.rep-metric-v{font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--t1)}
.rep-metric-l{font-size:12.5px;color:var(--t3);margin-top:4px}
.rep-metric-chg{font-size:12px;margin-top:6px;font-weight:500}

/* =============================================
   CONFIGURACIÓN
   ============================================= */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.cfg-sec-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--ws-border-lt)}
.cfg-row:last-child{border-bottom:none}
.cfg-lbl{font-size:13.5px;color:var(--t2)}
.cfg-hint{font-size:11.5px;color:var(--t3);margin-top:2px}
.cfg-input{background:var(--ws-bg);border:1px solid var(--ws-border);border-radius:var(--r-sm);padding:6px 10px;font-size:13px;color:var(--t1);width:180px;outline:none;transition:var(--fast)}
.cfg-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-light)}
.perm-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--ws-bg);border:1px solid var(--ws-border);border-radius:var(--r-full);font-size:12px;color:var(--t2);margin:3px}

/* =============================================
   RESPONSIVE
   ============================================= */
@media(max-width:1300px){
  .dash-stats{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:1050px){
  .equipo-grid{grid-template-columns:1fr 1fr}
  .rep-grid{grid-template-columns:1fr}
  .cfg-grid{grid-template-columns:1fr}
}
@media(max-width:860px){
  :root{--sb-w:62px}
  .logo-wordmark,.nav-item .label,.nav-badge,.user-name,.user-role,.nav-group{display:none}
  .nav-item{justify-content:center;padding:10px}
  .nav-item svg{width:20px;height:20px}
  .nav-item.active::before{display:none}
  .sb-footer{padding:8px}
  .user-card{justify-content:center;padding:8px}
  .dash-stats{grid-template-columns:1fr 1fr}
  .dash-row2,.dash-row3{grid-template-columns:1fr}
  .equipo-grid{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .rep-row3{grid-template-columns:1fr}
}
@media(max-width:600px){
  .view{padding:14px}
  .view-hd{flex-direction:column}

  .miss-grid{grid-template-columns:1fr}
  .int-grid{grid-template-columns:1fr}
  .auto-grid{grid-template-columns:1fr}
}
</style>

<script>
/* =============================================
   ALIVIA — Application Logic
   Phase 1: Navigation shell only
   ============================================= */

// ── Helpers ──────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag,cls='',html='') => { const e=document.createElement(tag); if(cls) e.className=cls; if(html) e.innerHTML=html; return e; };
const fmtDate = d => new Date(d).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});
const fmtDateShort = d => new Date(d).toLocaleDateString('es-CO',{day:'2-digit',month:'short'});
const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const pick = arr => arr[rand(0,arr.length-1)];

// ── Status badge helpers ─────────────────────
function getBadgeForStatus(status) {
  const map = {
    'Activo':     'b-green', 'Completado': 'b-green',
    'Procesado':  'b-green', 'Recibido':   'b-blue',
    'En proceso': 'b-blue',  'Revisado':   'b-purple',
    'Pendiente':  'b-amber', 'En mora':    'b-amber',
    'Vencido':    'b-red',   'Error':      'b-red',
    'Inactivo':   'b-gray',
  };
  const cls = map[status]||'b-gray';
  return `<span class="badge ${cls}">${status}</span>`;
}

function getEmpName(id) {
  const e = DATA.employees.find(e=>e.id===id);
  return e ? e.name.split(' ')[0]+' '+e.name.split(' ')[1][0]+'.' : '—';
}

function getEmpInitials(id) {
  const e = DATA.employees.find(e=>e.id===id);
  return e ? e.initials : '?';
}

function getEmpColor(id) {
  const e = DATA.employees.find(e=>e.id===id);
  return e ? e.color : '#888';
}

// ── Toast system ─────────────────────────────
function toast(msg, type='ok') {
  const icons = {ok:'✓', warn:'⚠', err:'✕', info:'ℹ'};
  const t = el('div',`toast ${type}`,`<span class="toast-ico">${icons[type]||'ℹ'}</span>${msg}`);
  $('toasts').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(16px)'; t.style.transition='0.3s'; setTimeout(()=>t.remove(),300); }, 3200);
}

// ── Modal system ─────────────────────────────
function openModal(html) {
  $('modal-content').innerHTML = html;
  $('modal-ov').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal() {
  $('modal-ov').classList.remove('open');
  document.body.style.overflow='';
}
$('modal-ov').addEventListener('click', e => { if(e.target===$('modal-ov')) closeModal(); });

// ── Navigation ───────────────────────────────
const VIEWS = ['dashboard','clientes','documentos','tareas','automatizaciones','integraciones','equipo','reportes','configuracion'];

function navigateTo(view) {
  if (!VIEWS.includes(view)) view = 'dashboard';
  // Update sidebar
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === view);
  });
  // Render
  const renderers = {
    dashboard: renderDashboard,
    clientes: renderClientes,
    documentos: renderDocumentos,
    tareas: renderTareas,
    automatizaciones: renderAutomatizaciones,
    integraciones: renderIntegraciones,
    equipo: renderEquipo,
    reportes: renderReportes,
    configuracion: renderConfiguracion
  };
  const fn = renderers[view];
  $('app-view').innerHTML = '';
  if (fn) {
    const div = el('div','view');
    div.innerHTML = fn();
    $('app-view').appendChild(div);
    if(typeof window[`init_${view}`]==='function') window[`init_${view}`]();
  }
  APP.currentView = view;
}

// Sidebar click delegation
document.getElementById('sb-nav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (item && item.dataset.view) navigateTo(item.dataset.view);
});

// ── APP State ────────────────────────────────
const APP = { currentView: 'dashboard', docTab: 'todos', clientTab: 0, taskFilter: 'todos', docFilter: 'todos' };

/* =============================================
   DATA LAYER
   ============================================= */

// ── Employees ──────────────────────────────

const _docTypes = ['XML','PDF','Factura electrónica','Nota crédito','Nota débito','Extracto bancario','RUT','Cámara de Comercio','Declaración IVA','Nómina'];
const _docSources = ['gmail','outlook','whatsapp','drive','onedrive','manual'];
const _docStatuses = ['Recibido','Procesado','Pendiente','Error'];
const _docStatusW = [3,4,2,1]; // weights

function weightedPick(arr,w){const t=w.reduce((a,b)=>a+b,0);let r=Math.random()*t;for(let i=0;i<arr.length;i++){r-=w[i];if(r<0)return arr[i];}return arr[arr.length-1];}

const _docTypeIcons = {
  'XML':        {bg:'#DBEAFE',color:'#1D4ED8',label:'XML'},

  'Nota crédito':{bg:'#FEF3C7',color:'#B45309',label:'NC'},
  'Nota débito':  {bg:'#FEF3C7',color:'#92400E',label:'ND'},
  'Extracto bancario':{bg:'#F0F9FF',color:'#0369A1',label:'EB'},
  'RUT':        {bg:'#FAF5FF',color:'#6D28D9',label:'RUT'},
  'Cámara de Comercio':{bg:'#ECFDF5',color:'#047857',label:'CC'},

  'XML':'factura_electronica_','PDF':'documento_pdf_','Factura electrónica':'fe_',

DATA.documents = Array.from({length:100},(_,i)=>{
  const client = DATA.clients[rand(0,49)];
  const type = pick(_docTypes);
  const source = pick(_docSources);
  const status = weightedPick(_docStatuses,_docStatusW);
  const daysAgo = rand(0,60);
  const date = new Date(Date.now()-daysAgo*86400000).toISOString().slice(0,10);
  return {
    id:i+1,
    type,
    clientId:client.id,
    clientName:client.name,
    date,
    source,
    status,
    filename: _fileNames[type]+(i+1).toString().padStart(3,'0')+'.'+((type==='XML')?'xml':'pdf'),
    size: rand(80,4200)+' KB',
  };
}).sort((a,b)=>b.date.localeCompare(a.date));

function switchClientTab(el, targetId) {
  document.querySelectorAll('.m-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['ct-overview','ct-docs','ct-tasks'].forEach(id=>{
    const el2=document.getElementById(id);
    if(el2) el2.style.display = id===targetId?'':'none';
  });
}
function renderDocumentos() {
  const tab = APP.docTab || 'todos';
  const srcFilter = APP.docSrc || 'todos';
  const typeFilter = APP.docType || 'todos';
  const search = APP.docSearch || '';

  let docs = DATA.documents.filter(d=>{
    const ms = srcFilter==='todos'||d.source===srcFilter;
    const mt = typeFilter==='todos'||d.type===typeFilter;
    const mq = !search||d.clientName.toLowerCase().includes(search.toLowerCase())||d.type.toLowerCase().includes(search.toLowerCase())||d.filename.toLowerCase().includes(search.toLowerCase());
    return ms&&mt&&mq;
  });

  const srcCounts = {};
  DATA.documents.forEach(d=>{ srcCounts[d.source]=(srcCounts[d.source]||0)+1; });

  // Missing docs section: clients with completeness < 75%
  const missingClients = DATA.clients.filter(c=>c.docCompleteness<75).slice(0,12);
  const reqDocs = ['XML','PDF','RUT','Cámara de Comercio','Extracto bancario','Nómina','Declaración IVA','Factura electrónica'];

  const docsTableHtml = docs.map(d=>{
    const ic = _docTypeIcons[d.type]||{bg:'#F3F4F6',color:'#374151',label:'DOC'};
    const client = DATA.clients.find(c=>c.id===d.clientId);
    return `<tr onclick="openDocModal(${d.id})">
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="doc-type-ic" style="background:${ic.bg};color:${ic.color}">${ic.label}</div>
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--t1)">${d.filename}</div>
            <div style="font-size:11.5px;color:var(--t3)">${d.type} · ${d.size}</div>
          </div>
        </div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:7px">
          ${client?`<div class="av" style="background:${client.color};width:22px;height:22px;font-size:9px">${client.initials}</div>`:''}
          <span style="font-size:13px">${d.clientName}</span>
        </div>
      </td>
      <td style="font-size:12.5px;color:var(--t3)">${fmtDate(d.date)}</td>
      <td><span class="src src-${d.source}">${d.source==='drive'?'Google Drive':d.source==='onedrive'?'OneDrive':d.source.charAt(0).toUpperCase()+d.source.slice(1)}</span></td>
      <td>${getBadgeForStatus(d.status)}</td>
    </tr>`;
  }).join('');

  const missingCardsHtml = missingClients.map(c=>{
    const clientDocs = DATA.documents.filter(d=>d.clientId===c.id);
    const hasDocs = new Set(clientDocs.map(d=>d.type));
    const missing = reqDocs.filter(d=>!hasDocs.has(d));
    const present = reqDocs.filter(d=>hasDocs.has(d));
    const emp = DATA.employees.find(e=>e.id===c.assignedTo);
    return `<div class="miss-card">
      <div class="miss-card-hd">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="av" style="background:${c.color}">${c.initials}</div>
            <div>
              <div class="miss-card-name">${c.name}</div>
              <div class="miss-card-meta">NIT: ${c.nit}</div>
            </div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:700;color:${c.docCompleteness<50?'var(--red)':'var(--amber)'}">${c.docCompleteness}%</div>
          <div style="font-size:11px;color:var(--t3)">completado</div>
        </div>
      </div>
      <div class="doc-cl">
        ${reqDocs.map(d=>`<div class="dc-item ${hasDocs.has(d)?'ok':'miss'}"><div class="dc-ic">${hasDocs.has(d)?'✓':'✗'}</div><span>${d}</span></div>`).join('')}
      </div>
      <div class="miss-card-ft">
        <div style="font-size:12px;color:var(--t3)">
          Resp: <span style="color:var(--t2);font-weight:500">${emp?emp.name.split(' ')[0]:'—'}</span>
          · <span style="color:var(--red);font-weight:600">${missing.length} faltante${missing.length!==1?'s':''}</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openClientModal(${c.id})">Ver cliente</button>
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();toast('Solicitud enviada a ${c.name.replace(/'/g,'').slice(0,15)}...','ok')">Solicitar</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const tabContent = tab==='faltantes'
    ? `<div><div class="sec-hd" style="margin-top:4px"><div><div class="sec-title">Documentos faltantes por cliente</div><div class="sec-sub">${missingClients.length} clientes con documentación incompleta</div></div></div><div class="miss-grid">${missingCardsHtml}</div></div>`

  return `

    <div>
      <h1>Documentos</h1>
      <p class="sub">${DATA.documents.length} documentos · ${DATA.documents.filter(d=>d.status==='Pendiente').length} pendientes · ${missingClients.length} clientes con faltantes</p>
    </div>
    <div class="view-actions">
      <button class="btn btn-secondary btn-sm">Exportar</button>
      <button class="btn btn-primary btn-sm" onclick="toast('Subida manual disponible en versión completa','warn')">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        Subir documento
      </button>
    </div>
  </div>

  <div class="doc-ctrl">
    <div class="search" style="min-width:240px">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
      <input type="text" placeholder="Buscar documento o cliente..." id="doc-search" oninput="APP.docSearch=this.value;navigateTo('documentos')" value="${search}">
    </div>
    <select class="cfg-input" style="width:auto" onchange="APP.docSrc=this.value;navigateTo('documentos')">
      <option value="todos" ${srcFilter==='todos'?'selected':''}>Todos los orígenes</option>
      ${['gmail','outlook','whatsapp','drive','onedrive','manual'].map(s=>`<option value="${s}" ${srcFilter===s?'selected':''}>${s==='drive'?'Google Drive':s==='onedrive'?'OneDrive':s.charAt(0).toUpperCase()+s.slice(1)} (${srcCounts[s]||0})</option>`).join('')}
    </select>
  </div>

  <div class="f-tabs" style="margin-bottom:18px">
    <div class="f-tab ${tab==='todos'?'active':''}" onclick="APP.docTab='todos';navigateTo('documentos')">Todos los documentos (${DATA.documents.length})</div>

      ⚠ Documentos faltantes (${missingClients.length} clientes)
    </div>
  </div>

  ${tabContent}`;
}

    <div class="tbl-wrap" style="border:none;box-shadow:none">

        <thead><tr><th>Empleado</th><th>Pendientes</th><th>En proceso</th><th>Completadas</th><th>Vencidas</th><th>Clientes</th></tr></thead>
        <tbody>${taskRows}</tbody>
      </table>
    </div>
  </div>`;
}
function renderReportes() {
  const months = ['Ene','Feb','Mar','Abr','May','Jun'];
  const docsByMonth = [42,65,58,78,89,113];
  const maxDocs = Math.max(...docsByMonth);

  const taskComp = DATA.employees.map(e=>{
    const total = DATA.tasks.filter(t=>t.assignedTo===e.id).length||1;
    const done = DATA.tasks.filter(t=>t.assignedTo===e.id&&t.status==='Completado').length;
    return { name:e.name.split(' ')[0], pct:Math.round(done/total*100), color:e.color };
  });

  const docTypeStats = _docTypes.map(t=>({
    type:t, count:DATA.documents.filter(d=>d.type===t).length,
    color: _docTypeIcons[t]?_docTypeIcons[t].color:'#888',
    bg: _docTypeIcons[t]?_docTypeIcons[t].bg:'#eee',
  })).sort((a,b)=>b.count-a.count);
  const maxTypeCount = Math.max(...docTypeStats.map(d=>d.count));

  const barsHtml = months.map((m,i)=>`
    <div class="cb-wrap">
      <div class="cb-val">${docsByMonth[i]}</div>
      <div class="cb-fill" style="height:${Math.round(docsByMonth[i]/maxDocs*140)}px;background:var(--brand)"></div>
      <div class="cb-lbl">${m}</div>
    </div>`).join('');

  const taskBarsHtml = taskComp.map(e=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="font-size:12.5px;color:var(--t2);width:60px;font-weight:500">${e.name}</div>
      <div class="prog" style="flex:1"><div class="prog-fill" style="width:${e.pct}%;background:${e.color}"></div></div>
      <div style="font-size:12.5px;color:var(--t1);font-weight:600;width:36px;text-align:right">${e.pct}%</div>
    </div>`).join('');

  const docTypeHtml = docTypeStats.map(d=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div class="doc-type-ic" style="background:${d.bg};color:${d.color};width:28px;height:28px;font-size:10px">${_docTypeIcons[d.type]?_docTypeIcons[d.type].label:'?'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12.5px;color:var(--t2);font-weight:500;margin-bottom:3px">${d.type}</div>
        <div class="prog sm"><div class="prog-fill" style="width:${Math.round(d.count/maxTypeCount*100)}%;background:${d.color}"></div></div>
      </div>
      <div style="font-size:13px;font-weight:600;color:var(--t1);width:28px;text-align:right">${d.count}</div>
    </div>`).join('');

  const missByClient = DATA.clients
    .filter(c=>c.docCompleteness<80)
    .sort((a,b)=>a.docCompleteness-b.docCompleteness)
    .slice(0,5);

  const missByClientHtml = missByClient.map(c=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
      <div class="av" style="background:${c.color};width:26px;height:26px;font-size:10px">${c.initials}</div>
      <div style="flex:1;min-width:0;font-size:12.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
      <div class="prog" style="width:80px"><div class="prog-fill" style="width:${c.docCompleteness}%;background:${c.docCompleteness<50?'var(--red)':'var(--amber)'}"></div></div>
      <div style="font-size:12px;font-weight:600;color:${c.docCompleteness<50?'var(--red)':'var(--amber)'};width:32px;text-align:right">${c.docCompleteness}%</div>
    </div>`).join('');

  const activeClients = DATA.clients.filter(c=>c.status==='Activo').length;
  const compRate = Math.round(DATA.tasks.filter(t=>t.status==='Completado').length/DATA.tasks.length*100);
  const totalDocs = DATA.documents.length;

  return `
  <div class="view-hd">
    <div>
      <h1>Reportes</h1>
      <p class="sub">Resumen del período — Enero a Junio 2025</p>
    </div>
    <div class="view-actions">
      <select class="cfg-input" style="width:auto"><option>Enero–Junio 2025</option><option>Último trimestre</option><option>Este mes</option></select>
      <button class="btn btn-secondary btn-sm">Exportar PDF</button>
    </div>
  </div>

  <div class="rep-row3">
    <div class="card" style="text-align:center;padding:22px">
      <div style="font-size:36px;font-weight:800;color:var(--brand);letter-spacing:-1px">${activeClients}</div>
      <div style="font-size:13px;color:var(--t3);margin-top:4px">Clientes activos</div>
      <div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:500">↑ +3 este mes</div>
    </div>
    <div class="card" style="text-align:center;padding:22px">
      <div style="font-size:36px;font-weight:800;color:var(--t1);letter-spacing:-1px">${totalDocs}</div>
      <div style="font-size:13px;color:var(--t3);margin-top:4px">Documentos recibidos</div>
      <div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:500">↑ +27% vs período ant.</div>
    </div>
    <div class="card" style="text-align:center;padding:22px">
      <div style="font-size:36px;font-weight:800;color:${compRate>70?'var(--green)':'var(--amber)'};letter-spacing:-1px">${compRate}%</div>
      <div style="font-size:13px;color:var(--t3);margin-top:4px">Tasa de completitud</div>
      <div style="font-size:12px;color:var(--t3);margin-top:6px;font-weight:500">${DATA.tasks.filter(t=>t.status==='Completado').length} de ${DATA.tasks.length} tareas</div>
    </div>
  </div>

  <div class="rep-grid">
    <div class="card">
      <div class="sec-hd"><div class="sec-title">Documentos recibidos por mes</div></div>
      <div class="chart-bars">${barsHtml}</div>
      <div class="chart-legend">
        <div class="cl-item"><div class="cl-dot" style="background:var(--brand)"></div>Documentos totales</div>
      </div>
    </div>
    <div class="card">
      <div class="sec-hd"><div class="sec-title">Tasa de completitud por empleado</div></div>
      <div style="padding-top:8px">${taskBarsHtml}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="sec-hd"><div class="sec-title">Documentos por tipo</div></div>
      ${docTypeHtml}
    </div>
    <div class="card">
      <div class="sec-hd"><div class="sec-title">Documentación pendiente por cliente</div><button class="btn btn-ghost btn-sm" onclick="navigateTo('documentos')">Ver faltantes →</button></div>
      ${missByClientHtml}
    </div>
  </div>`;
}

      <div class="cfg-row"><div><div class="cfg-lbl">Teléfono</div></div><input class="cfg-input" value="+57 601 555 1234"></div>

    <div class="card">
      <div class="cfg-sec-title">
        <svg viewBox="0 0 16 16" fill="var(--brand)" width="16" height="16"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947z" clip-rule="evenodd"/></svg>
        Notificaciones
      </div>
      ${notifs.map(([lbl,hint,on])=>`
      <div class="cfg-row">
        <div><div class="cfg-lbl">${lbl}</div><div class="cfg-hint">${hint}</div></div>
        <label class="tog"><input type="checkbox" ${on?'checked':''} onchange="toast('Notificación '+(this.checked?'activada':'desactivada'),'ok')"><div class="tog-track"></div><div class="tog-thumb"></div></label>
      </div>`).join('')}
    </div>

    <div class="card">
      <div class="cfg-sec-title">
        <svg viewBox="0 0 16 16" fill="var(--brand)" width="16" height="16"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h6a1 1 0 110 2H5a1 1 0 01-1-1zM5 11a1 1 0 100 2h6a1 1 0 100-2H5z"/></svg>
        Categorías de documentos
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${docCats.map(c=>`<span class="perm-tag">${c} <span style="color:var(--t3);cursor:pointer;margin-left:4px" onclick="toast('Categoría eliminada','warn')">×</span></span>`).join('')}
      </div>
      <button class="btn btn-secondary btn-sm" onclick="toast('Nueva categoría creada','ok')">+ Agregar categoría</button>
    </div>

    <div class="card">
      <div class="cfg-sec-title">
        <svg viewBox="0 0 16 16" fill="var(--brand)" width="16" height="16"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
        Roles y permisos
      </div>
      ${roles.map((r,i)=>`
      <div class="cfg-row">
        <div><div class="cfg-lbl">${r}</div></div>
        <button class="btn btn-ghost btn-sm" onclick="toast('Editor de permisos para ${r}','ok')">Editar permisos</button>
      </div>`).join('')}
    </div>
  </div>`;
}

navigateTo('dashboard');
</script>
</body>
